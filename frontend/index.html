<!DOCTYPE html>
<html>
<head>
    <title>Real-Time Chat</title>
    <meta name="api-base-url" content="https://realtimechatapp24.onrender.com">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #111b21;
        }

        /* HEADER */
        .header {
            background-color: #202c33;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }

        /* MAIN CHAT AREA */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-width: 500px;
            margin: auto;
            background: #0b141a;
        }

        /* CHAT BOX */
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        /* MESSAGE BUBBLES */
        .message {
            max-width: 70%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 10px;
            font-size: 14px;
            position: relative;
        }

        .sent {
            background-color: #005c4b;
            color: white;
            margin-left: auto;
        }

        .received {
            background-color: #202c33;
            color: white;
            margin-right: auto;
        }

        .sender {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 3px;
        }

        .time {
            font-size: 10px;
            color: #ccc;
            text-align: right;
            margin-top: 4px;
        }

        /* INPUT AREA */
        .input-container {
            background: #202c33;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }

        .row {
            display: flex;
            gap: 5px;
            margin-bottom: 5px;
        }

        input {
            flex: 1;
            padding: 8px;
            border-radius: 20px;
            border: none;
            outline: none;
        }

        button {
            padding: 8px 15px;
            border: none;
            border-radius: 20px;
            background-color: #25d366;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #1ebe5d;
        }

    </style>
</head>

<body>

<div class="header">Real-Time Chat</div>

<div class="chat-container">

    <div id="chat" class="chat-box"></div>

    <div class="input-container">

        <div class="row">
            <input id="sender" placeholder="Your Name">
            <input id="receiver" placeholder="Receiver">
        </div>

        <div class="row">
            <input id="message" placeholder="Type a message...">
            <button onclick="sendMessage()">Send</button>
            <button onclick="loadChat()">Load</button>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>
<script src="app.js"></script>

</body>
</html>
